<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fırsat Radar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f3f6fb;
  margin:0;
  padding:40px 20px;
}

.wrapper{
  max-width:1100px;
  margin:0 auto;
}

h1{
  font-size:32px;
  margin-bottom:8px;
}

.subtitle{
  color:#64748b;
  margin-bottom:24px;
}

.filters{
  background:white;
  border-radius:20px;
  padding:18px;
  margin-bottom:22px;
  box-shadow:0 10px 30px rgba(15,23,42,.07);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.filters input{
  padding:12px;
  border:1px solid #d1d5db;
  border-radius:12px;
  font-size:14px;
}

.card{
  background:white;
  border-radius:22px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 14px 40px rgba(15,23,42,.08);
  border:1px solid rgba(148,163,184,.18);
}

.top{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}

.score{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  padding:10px 16px;
  border-radius:999px;
  font-weight:800;
  white-space:nowrap;
}

.title{
  font-size:22px;
  font-weight:800;
  margin:14px 0 8px;
}

.price{
  font-size:28px;
  font-weight:900;
  color:#dc2626;
  margin-bottom:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:14px;
}

.item{
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:12px;
  font-size:15px;
}

.btn{
  display:inline-block;
  margin-top:18px;
  padding:12px 18px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-weight:700;
}

.empty{
  background:white;
  border-radius:18px;
  padding:24px;
  color:#64748b;
}

@media(max-width:900px){
  .filters{grid-template-columns:1fr 1fr;}
}

@media(max-width:700px){
  .top{display:block;}
  .grid{grid-template-columns:1fr;}
  .price{font-size:24px;}
  .filters{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrapper">

<h1>🏠 Fırsat Radar</h1>
<div class="subtitle">Puanı yüksek, fiyat avantajı olan satılık daire adayları</div>

<div class="filters">
  <input id="cityFilter" placeholder="İl">
  <input id="districtFilter" placeholder="İlçe">
  <input id="minPriceFilter" type="number" placeholder="Min Fiyat">
  <input id="maxPriceFilter" type="number" placeholder="Max Fiyat">
  <input id="minScoreFilter" type="number" placeholder="Min Puan">
</div>

<div id="list"></div>

</div>

<script>
let allListings = [];

function renderListings(data){
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(data.length === 0){
    list.innerHTML = `<div class="empty">Bu filtrelere uygun ilan bulunamadı.</div>`;
    return;
  }

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        <div class="top">
          <div>
            <div class="title">${item.title}</div>
            <div class="price">${Number(item.price).toLocaleString("tr-TR")} TL</div>
          </div>
          <div class="score">🏆 ${item.opportunity_score}/100</div>
        </div>

        <div class="grid">
          <div class="item">📍 <b>Konum:</b> ${item.city} / ${item.district} / ${item.neighborhood}</div>
          <div class="item">🏠 <b>Oda:</b> ${item.room_count}</div>
          <div class="item">📐 <b>m²:</b> Brüt ${item.gross_m2} / Net ${item.net_m2}</div>
          <div class="item">🏢 <b>Kat:</b> ${item.floor_info || "Belirtilmemiş"}</div>
          <div class="item">🛗 <b>Asansör:</b> ${item.elevator ? "Var" : "Yok"}</div>
          <div class="item">📉 <b>İskonto:</b> %${item.discount_percent}</div>
        </div>

        <a class="btn" href="${item.url}" target="_blank">🔗 İlana Git</a>
      </div>
    `;
  });
}

function applyFilters(){
  const city = document.getElementById("cityFilter").value.toLowerCase();
  const district = document.getElementById("districtFilter").value.toLowerCase();
  const minPrice = Number(document.getElementById("minPriceFilter").value);
  const maxPrice = Number(document.getElementById("maxPriceFilter").value);
  const minScore = Number(document.getElementById("minScoreFilter").value);

  const filtered = allListings.filter(item => {
    const itemCity = String(item.city || "").toLowerCase();
    const itemDistrict = String(item.district || "").toLowerCase();
    const price = Number(item.price || 0);
    const score = Number(item.opportunity_score || 0);

    if(city && !itemCity.includes(city)) return false;
    if(district && !itemDistrict.includes(district)) return false;
    if(minPrice && price < minPrice) return false;
    if(maxPrice && price > maxPrice) return false;
    if(minScore && score < minScore) return false;

    return true;
  });

  renderListings(filtered);
}

fetch("https://firsat-radar-backend.onrender.com/listings")
.then(r => r.json())
.then(data => {
  allListings = data;
  renderListings(allListings);
});

["cityFilter","districtFilter","minPriceFilter","maxPriceFilter","minScoreFilter"].forEach(id => {
  document.addEventListener("input", function(e){
    if(e.target.id === id){
      applyFilters();
    }
  });
});
</script>

</body>
</html>
